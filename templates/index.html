<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="/about">About</a>
      </nav>
      <h1>My Links</h1>

      <form action="/add" method="post">
        <div class="form-group">
          <label for="site_name">Site Name</label>
          <input id="site_name" name="site_name" type="text" required>
        </div>
        <div class="form-group">
          <label for="site_url">URL</label>
          <input id="site_url" name="site_url" type="url" required>
        </div>
        <button class="add-btn" type="submit">Add Link</button>
        <button type="submit">Add Link</button>
      </form>

      <ul>
        {% for link in links %}
        <li class="link-card">
          <a href="{{ link.url }}">{{ link.name }}</a>
          <div class="card-actions">
            <a class="edit-link" href="{{ url_for('edit_link', link_index=loop.index0) }}">Edit</a>
            <form action="{{ url_for('delete_link', link_index=loop.index0) }}" method="post">
              <button class="delete-btn" type="submit">Delete</button>
            </form>
          </div>
        </li>
        {% endfor %}
      </ul>
    </main>
        <li class="link-card"><a href="{{ link.url }}">{{ link.name }}</a></li>
        {% endfor %}
      </ul>
    </main>
    <title>My Links</title>
  </head>

</html>
