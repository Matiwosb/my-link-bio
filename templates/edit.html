<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Edit Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="/">Home</a>
      </nav>
      <h1>Edit Link</h1>

      <form action="{{ url_for('edit_link', link_index=link_index) }}" method="post">
        <div class="form-group">
          <label for="site_name">Site Name</label>
          <input id="site_name" name="site_name" type="text" value="{{ link.name }}" required>
        </div>
        <div class="form-group">
          <label for="site_url">URL</label>
          <input id="site_url" name="site_url" type="url" value="{{ link.url }}" required>
        </div>
        <button class="add-btn" type="submit">Save Changes</button>
      </form>
    </main>
  </body>
</html>
